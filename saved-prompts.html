<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prompt Tersimpan — Prompt Generator Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .prompts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
    @media(max-width:600px){ .prompts-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>✨ Prompt Generator Pro</h1>
      <p>Business Website Builder</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Utama</div>
        <a href="dashboard.html" class="nav-link"><span class="nav-icon">🏠</span> Dashboard</a>
        <a href="generator.html" class="nav-link"><span class="nav-icon">✨</span> Jana Prompt Baru</a>
        <a href="saved-prompts.html" class="nav-link active"><span class="nav-icon">💾</span> Prompt Tersimpan</a>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">Akaun</div>
        <a href="#" class="nav-link" data-logout><span class="nav-icon">🚪</span> Log Keluar</a>
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="user-info">
        <div class="user-avatar" data-user-initials>??</div>
        <div>
          <div class="user-name" data-user-name>Pengguna</div>
          <div class="user-plan" data-user-plan>Free Plan</div>
        </div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main-content">
    <div class="top-bar">
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      <span style="font-weight:700;font-size:.95rem">💾 Prompt Tersimpan</span>
      <div style="width:34px"></div>
    </div>

    <div class="page-header">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <h1 class="page-title">💾 Prompt Tersimpan</h1>
          <p class="page-subtitle"><span id="countLabel">0</span> prompt dijumpai</p>
        </div>
        <a href="generator.html" class="btn btn-primary"><i class="fa fa-wand-magic-sparkles"></i> Jana Prompt Baru</a>
      </div>
    </div>

    <div class="page-body">
      <!-- FILTER BAR -->
      <div class="filter-bar">
        <div class="search-wrap">
          <span class="search-icon"><i class="fa fa-search"></i></span>
          <input type="text" class="form-control" id="searchInput" placeholder="Cari prompt..." oninput="applyFilters()"/>
        </div>
        <div>
          <select class="form-control" id="sortSelect" onchange="applyFilters()" style="padding:8px 12px;font-size:.85rem">
            <option value="newest">Terbaru dahulu</option>
            <option value="oldest">Terlama dahulu</option>
            <option value="az">A → Z</option>
            <option value="fav">Kegemaran dahulu</option>
          </select>
        </div>
      </div>

      <!-- TABS -->
      <div class="filter-tabs" style="margin-bottom:20px" id="filterTabs">
        <button class="filter-tab active" onclick="setTab('all',this)">Semua</button>
        <button class="filter-tab" onclick="setTab('favourite',this)">⭐ Kegemaran</button>
      </div>

      <!-- GRID -->
      <div class="prompts-grid" id="promptsGrid"></div>
    </div>
  </main>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModal">
  <div class="modal" style="max-width:800px">
    <div class="modal-header">
      <h3 class="modal-title" id="viewTitle">Lihat Prompt</h3>
      <button class="modal-close" onclick="closeModal('viewModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px" id="viewMeta"></div>
      <textarea id="viewText" class="form-control" style="min-height:360px;font-family:monospace;font-size:.78rem;resize:vertical" readonly></textarea>
    </div>
    <div class="modal-footer" style="flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" onclick="copyView()"><i class="fa fa-copy"></i> Salin</button>
      <button class="btn btn-ghost btn-sm" onclick="downloadView()"><i class="fa fa-download"></i> .txt</button>
      <button class="btn btn-blue btn-sm" onclick="openClaudeView()"><i class="fa fa-robot"></i> Guna di Claude</button>
      <button class="btn btn-secondary btn-sm" onclick="editCurrent()"><i class="fa fa-pen"></i> Edit</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('viewModal')">Tutup</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 class="modal-title">Pengesahan Padam</h3>
      <button class="modal-close" onclick="closeConfirmModal()">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirmMessage" style="color:var(--text-secondary)"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeConfirmModal()">Batal</button>
      <button class="btn btn-danger" id="confirmOk">Ya, Padam</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script>
const session = requireAuth();
if (session) populateUserUI(session);

let currentTab  = 'all';
let currentView = null;

// Check URL param
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('filter') === 'favourite') currentTab = 'favourite';

function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

async function applyFilters() {
  const q    = document.getElementById('searchInput').value.trim();
  const sort = document.getElementById('sortSelect').value;
  let prompts = await getUserPrompts();

  if (currentTab === 'favourite') prompts = prompts.filter(p => p.is_favourite);
  if (q) {
    const ql = q.toLowerCase();
    prompts = prompts.filter(p =>
      p.title.toLowerCase().includes(ql) ||
      (p.business_type_label||'').toLowerCase().includes(ql) ||
      (p.tags||[]).some(t=>t.toLowerCase().includes(ql))
    );
  }

  if (sort === 'oldest') prompts.sort((a,b) => new Date(a.created_at)-new Date(b.created_at));
  else if (sort === 'az') prompts.sort((a,b) => a.title.localeCompare(b.title));
  else if (sort === 'fav') prompts.sort((a,b) => (b.is_favourite?1:0)-(a.is_favourite?1:0));
  else prompts.sort((a,b) => new Date(b.updated_at)-new Date(a.updated_at));

  renderPrompts(prompts);
}

function renderPrompts(prompts) {
  document.getElementById('countLabel').textContent = prompts.length;
  const grid = document.getElementById('promptsGrid');

  if (!prompts.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📭</div>
      <h3>Tiada Prompt Dijumpai</h3>
      <p>Cuba cari dengan kata kunci lain atau jana prompt baharu.</p>
      <a href="generator.html" class="btn btn-primary"><i class="fa fa-wand-magic-sparkles"></i> Jana Sekarang</a>
    </div>`;
    return;
  }

  grid.innerHTML = prompts.map(p => `
    <div class="prompt-card">
      <div class="prompt-card-header">
        <div style="flex:1;min-width:0">
          <div class="prompt-card-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.business_type_label||''} ${p.title}</div>
          <div class="prompt-card-meta">${timeAgo(p.updated_at)} &middot; v${p.version||1}</div>
        </div>
        <button class="star-btn" onclick="toggleFav('${p.id}')" title="${p.is_favourite?'Buang kegemaran':'Tambah kegemaran'}">${p.is_favourite?'⭐':'☆'}</button>
      </div>
      <div class="prompt-card-tags">
        ${(p.tags||[]).slice(0,3).map(t=>`<span class="badge badge-blue">#${t}</span>`).join('')}
        ${p.generated_prompt ? `<span class="badge badge-green">${p.generated_prompt.length} aksara</span>` : ''}
      </div>
      <div class="prompt-card-actions">
        <button class="btn btn-ghost btn-sm" onclick="viewPrompt('${p.id}')"><i class="fa fa-eye"></i> Lihat</button>
        <a href="generator.html?edit=${p.id}" class="btn btn-ghost btn-sm"><i class="fa fa-pen"></i> Edit</a>
        <button class="btn btn-ghost btn-sm" onclick="copyPrompt('${p.id}')"><i class="fa fa-copy"></i> Salin</button>
        <button class="btn btn-danger btn-sm" onclick="removePrompt('${p.id}')"><i class="fa fa-trash"></i></button>
      </div>
    </div>`).join('');
}

async function viewPrompt(id) {
  const p = await getPromptById(id);
  if (!p) return;
  currentView = p;
  document.getElementById('viewTitle').textContent = p.title;
  document.getElementById('viewMeta').innerHTML = `
    <span class="badge badge-green">${p.business_type_label||'Prompt'}</span>
    <span class="badge badge-blue">v${p.version||1}</span>
    <span class="badge badge-yellow">${new Date(p.created_at).toLocaleDateString('ms-MY')}</span>
    ${p.is_favourite?'<span class="badge badge-yellow">⭐ Kegemaran</span>':''}`;
  document.getElementById('viewText').value = p.generated_prompt || '(Prompt kosong)';
  openModal('viewModal');
}

function copyView()   { copyToClipboard(currentView?.generated_prompt||''); }
function downloadView(){ if(currentView) exportAsTxt(currentView.generated_prompt, currentView.title); }
function openClaudeView() { if(currentView) openInClaude(currentView.generated_prompt); }
function editCurrent() { if(currentView){ closeModal('viewModal'); window.location.href='generator.html?edit='+currentView.id; } }

async function copyPrompt(id) {
  const p = await getPromptById(id);
  if (p) copyToClipboard(p.generated_prompt||'');
}

async function toggleFav(id) {
  const isFav = await toggleFavourite(id);
  showToast(isFav ? 'Ditambah ke kegemaran ⭐' : 'Dibuang dari kegemaran', 'success');
  applyFilters();
}

function removePrompt(id) {
  confirmAction('Padam prompt ini? Tindakan ini tidak boleh dibatalkan.', async () => {
    await deletePrompt(id);
    showToast('Prompt dipadam.', 'success');
    applyFilters();
  });
}

// Init
if (currentTab === 'favourite') {
  document.querySelector('.filter-tab').classList.remove('active');
  document.querySelectorAll('.filter-tab')[1].classList.add('active');
}
applyFilters();
</script>
</body>
</html>
